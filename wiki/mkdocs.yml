site_name: Civic Data Commons
site_description: Open knowledge base for Indian civic data — contractors, findings, RTI responses, data sources
site_url: https://data.kaun.city
repo_url: https://github.com/kaun-city/kaun
repo_name: kaun-city/kaun
edit_uri: edit/master/wiki/docs/
docs_dir: docs

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Bengaluru:
    - Overview: bengaluru/index.md
    - Contractors:
      - Overview: bengaluru/contractors/index.md
      - KRIDL: bengaluru/contractors/kridl.md
      - Add new contractor: bengaluru/contractors/_template.md
    - Findings:
      - Overview: bengaluru/findings/index.md
      - Ghost Workers Scam (Rs 934 Cr): bengaluru/findings/ghost-workers-scam.md
      - KRIDL 4(g) Exemption (Rs 4,700 Cr): bengaluru/findings/kridl-4g-exemption.md
      - Add new finding: bengaluru/findings/_template.md
    - Data Sources:
      - BBMP IFMS: bengaluru/sources/bbmp-ifms.md
      - KPPP: bengaluru/sources/kppp.md
      - OpenCity.in: bengaluru/sources/opencity.md
    - Wards:
      - Add ward info: bengaluru/wards/_template.md
    - RTI Responses:
      - Upload RTI: bengaluru/rti-responses/_template.md
  - Pan-India Sources: sources/index.md
  - About:
    - Partners & Contributors: about/partners.md
    - API Reference: about/api.md
    - Contributing: about/contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kaun-city/kaun
    - icon: material/web
      link: https://kaun.city
  generator: false

copyright: |
  &copy; 2026 kaun.city &middot; Data is public; wiki content is
  <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>
