site_name: Bengaluru Civic Data Wiki
site_description: Open, community-maintained knowledge base of Bengaluru civic data
site_url: https://data.kaun.city
repo_url: https://github.com/kaun-city/kaun
repo_name: kaun-city/kaun
edit_uri: edit/master/wiki/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

nav:
  - Home: README.md
  - Contractors:
    - Overview: contractors/index.md
    - KRIDL: contractors/kridl.md
    - Add new contractor: contractors/_template.md
  - Findings:
    - Overview: findings/index.md
    - Ghost Workers Scam (Rs 934 Cr): findings/ghost-workers-scam.md
    - KRIDL 4(g) Exemption (Rs 4,700 Cr): findings/kridl-4g-exemption.md
    - Add new finding: findings/_template.md
  - Data Sources:
    - BBMP IFMS: sources/bbmp-ifms.md
    - KPPP: sources/kppp.md
    - OpenCity.in: sources/opencity.md
  - Wards:
    - Add ward info: wards/_template.md
  - RTI Responses:
    - Upload RTI: rti-responses/_template.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kaun-city/kaun
    - icon: material/web
      link: https://kaun.city
  generator: false

copyright: |
  &copy; 2026 kaun.city — Data is public; wiki content is
  <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>
