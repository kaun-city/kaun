name: Refresh Sakala Performance

# Sakala (sakala.kar.nic.in) blocks all known datacenter IP ranges with
# "Host not in allowlist" 403s — every GitHub Actions runner is blocked.
# Verified May 2026. Keeping the workflow callable on demand so it can be
# triggered from a laptop on residential ISP; the cron schedule is removed
# because it can never succeed in CI and was failing every 1st of the month.
on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (e.g. 2025)'
        default: ''
      month:
        description: 'Month code (1-12 or 13 for all)'
        default: '13'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sakala scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_MANAGEMENT_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="--year=${{ github.event.inputs.year }}"
          fi
          ARGS="$ARGS --month=${{ github.event.inputs.month || '13' }}"
          node scripts/refresh-sakala.mjs $ARGS
