name: Refresh Sakala Performance

on:
  # sakala.kar.nic.in blocks GitHub Actions IPs — run manually from local machine
  # schedule disabled: was '0 2 1 * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (e.g. 2025)'
        default: ''
      month:
        description: 'Month code (1-12 or 13 for all)'
        default: '13'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sakala scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_MANAGEMENT_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="--year=${{ github.event.inputs.year }}"
          fi
          ARGS="$ARGS --month=${{ github.event.inputs.month || '13' }}"
          node scripts/refresh-sakala.mjs $ARGS
