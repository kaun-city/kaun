name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: npm test

      - name: Type check (apps/web)
        working-directory: apps/web
        run: |
          npm install --no-audit --no-fund
          npm run typecheck
